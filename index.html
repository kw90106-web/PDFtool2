<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Merger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  #app { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
  #drop-zone {
    border: 1.5px dashed #ccc; border-radius: 12px; padding: 2.5rem;
    text-align: center; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: #fff; margin-bottom: 1.5rem;
  }
  #drop-zone:hover, #drop-zone.drag-over { background: #eef4ff; border-color: #4a8fe8; }
  #drop-zone p { font-size: 14px; color: #666; margin-top: 8px; }
  #drop-zone .icon { font-size: 36px; margin-bottom: 8px; }
  #file-input { display: none; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1px solid #ddd; background: #fff; color: #1a1a1a;
    transition: background 0.1s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover { background: #f0f0ee; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: transparent; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { background: #aaa; }
  .btn-scan { background: #f0f6ff; color: #3a6bd4; border-color: #b8d0f8; }
  .btn-scan:hover:not(:disabled) { background: #e0ecff; }
  #page-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px; margin-bottom: 1.5rem;
  }
  .page-card {
    border: 1px solid #e0e0e0; border-radius: 8px; background: #fff;
    cursor: grab; overflow: hidden; transition: border-color 0.15s, opacity 0.15s;
    user-select: none; position: relative;
  }
  .page-card:hover { border-color: #aaa; }
  .page-card.dragging { opacity: 0.4; cursor: grabbing; }
  .page-card.drag-over-card { border: 2px solid #4a8fe8; }
  .page-card canvas { width: 100%; height: auto; display: block; background: #fff; }
  .page-card-footer {
    padding: 5px 7px; display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid #f0f0ee; background: #fafaf8;
  }
  .page-label { font-size: 10px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65px; }
  .page-actions { display: flex; gap: 3px; }
  .icon-btn {
    width: 24px; height: 24px; border-radius: 4px; border: none; background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #777; transition: background 0.1s, color 0.1s;
  }
  .icon-btn:hover { background: #f0f0ee; color: #1a1a1a; }
  .icon-btn.del:hover { background: #fff0f0; color: #c0392b; }
  .page-number {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,0.45); color: #fff;
    font-size: 9px; padding: 1px 5px; border-radius: 3px; pointer-events: none;
  }
  #bottom-bar { padding-top: 1rem; border-top: 1px solid #e0e0e0; display: flex; flex-direction: column; gap: 10px; }
  #filename-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #prefix-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding-bottom: 8px; border-bottom: 1px solid #ebebeb; margin-bottom: 8px;
    font-size: 13px;
  }
  #prefix-label { color: #555; font-size: 13px; white-space: nowrap; font-weight: 500; }
  .prefix-opt { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #444; }
  .prefix-opt input[type=radio] { accent-color: #4a8fe8; }
  #prefix-bracket-wrap { color: #444; display: flex; align-items: center; gap: 2px; }
  #bracket-input {
    width: 100px; font-size: 13px; padding: 4px 6px;
    border: 1px solid #ddd; border-radius: 6px;
  }
  #prefix-preview { font-size: 12px; color: #4a8fe8; margin-left: 4px; white-space: nowrap; }
  #filename-row label { font-size: 14px; color: #555; white-space: nowrap; }
  #filename {
    flex: 1; min-width: 180px; max-width: 380px;
    font-size: 13px; padding: 7px 10px; border-radius: 8px;
    border: 1px solid #ddd; background: #fff; color: #1a1a1a;
    transition: border-color 0.2s, background 0.2s;
  }
  #filename.auto-filled { border-color: #4a8fe8; background: #f0f6ff; }
  #scan-hint { font-size: 12px; margin-left: 2px; }
  #action-row { display: flex; align-items: center; gap: 10px; }
  #status { font-size: 13px; color: #777; margin-right: auto; }
  #empty-state { text-align: center; padding: 2rem 0; color: #aaa; font-size: 14px; }
  .loading-overlay {
    position: absolute; inset: 0; background: rgba(255,255,255,0.8);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #aaa;
  }

  /* ===== プレビューモーダル ===== */
  #preview-modal {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
  }
  #preview-modal.open { display: flex; }
  #preview-inner {
    background: #fff; border-radius: 12px; overflow: hidden;
    max-width: 92vw; max-height: 92vh;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,0.45);
  }
  #preview-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid #e0e0e0;
    font-size: 13px; color: #555;
  }
  #preview-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #preview-nav { display: flex; align-items: center; gap: 6px; }
  #preview-nav button, #preview-close {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid #ddd;
    background: #fff; cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center; color: #555;
  }
  #preview-nav button:hover:not(:disabled), #preview-close:hover { background: #f0f0ee; color: #1a1a1a; }
  #preview-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  #preview-close { border-color: transparent; font-size: 18px; margin-left: 2px; }
  #preview-page-info { font-size: 12px; color: #888; min-width: 50px; text-align: center; }
  #preview-canvas-wrap {
    overflow: auto; display: flex; align-items: flex-start; justify-content: center;
    padding: 16px; background: #e8e8e6; flex: 1;
  }
  #preview-canvas-wrap canvas { display: block; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }

  /* ===== 押印モーダル ===== */
  #stamp-modal {
    display: none; position: fixed; inset: 0; z-index: 1100;
    background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
  }
  #stamp-modal.open { display: flex; }
  #stamp-inner {
    background: #fff; border-radius: 14px; overflow: hidden;
    width: min(95vw, 820px); max-height: 94vh;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,0.45);
  }
  #stamp-header {
    display: flex; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid #e0e0e0; gap: 10px;
    font-size: 14px; font-weight: 500;
  }
  #stamp-header span { flex: 1; }
  #stamp-close {
    width: 28px; height: 28px; border-radius: 6px; border: none;
    background: transparent; cursor: pointer; font-size: 18px; color: #888;
    display: flex; align-items: center; justify-content: center;
  }
  #stamp-close:hover { background: #f0f0ee; color: #1a1a1a; }
  #stamp-body {
    display: flex; flex: 1; overflow: hidden; min-height: 0;
  }
  #stamp-sidebar {
    width: 220px; min-width: 220px; padding: 16px; border-right: 1px solid #e8e8e8;
    display: flex; flex-direction: column; gap: 14px; overflow-y: auto;
    background: #fafaf8;
  }
  #stamp-sidebar label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  #stamp-sidebar input[type=text] {
    width: 100%; padding: 7px 9px; border-radius: 7px;
    border: 1px solid #ddd; font-size: 13px;
  }
  #stamp-sidebar input[type=range] { width: 100%; }
  .stamp-size-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; }
  .stamp-size-row span { min-width: 32px; text-align: right; }
  #stamp-preview-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 8px 0;
  }
  #stamp-canvas-preview {
    border: 1px dashed #ccc; border-radius: 50%;
  }
  #stamp-hint { font-size: 11px; color: #888; line-height: 1.5; }
  #stamp-apply-btn {
    margin-top: auto; width: 100%; padding: 9px; border-radius: 8px;
    border: none; background: #c0392b; color: #fff;
    font-size: 14px; font-weight: 500; cursor: pointer;
  }
  #stamp-apply-btn:hover { background: #a93226; }
  #stamp-apply-btn:disabled { background: #ccc; cursor: not-allowed; }
  #stamp-canvas-area {
    flex: 1; overflow: auto; background: #e8e8e6;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px; position: relative;
  }
  #stamp-page-wrap {
    position: relative; display: inline-block; cursor: crosshair;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  #stamp-page-canvas { display: block; }
  #stamp-overlay {
    position: absolute; inset: 0; cursor: crosshair;
  }
  #stamp-btn { background: #fff5f5; color: #c0392b; border-color: #f5b7b1; }
  #stamp-btn:hover:not(:disabled) { background: #fde8e8; }
</style>
</head>
<body>
<div id="preview-modal">
  <div id="preview-inner">
    <div id="preview-header">
      <span id="preview-title"></span>
      <div id="preview-nav">
        <button id="prev-btn">&#8592;</button>
        <span id="preview-page-info"></span>
        <button id="next-btn">&#8594;</button>
      </div>
      <button id="preview-close">&#x2715;</button>
    </div>
    <div id="preview-canvas-wrap"><canvas id="preview-canvas"></canvas></div>
  </div>
</div>

<div id="stamp-modal">
  <div id="stamp-inner">
    <div id="stamp-header">
      <span>🔴 押印設定</span>
      <button id="stamp-close">&#x2715;</button>
    </div>
    <div id="stamp-body">
      <div id="stamp-sidebar">
        <div>
          <label>印鑑の名前</label>
          <input type="text" id="stamp-name" placeholder="例：山田太郎" value="">
        </div>
        <div>
          <label>サイズ</label>
          <div class="stamp-size-row">
            <input type="range" id="stamp-size" min="10" max="40" value="29">
            <span id="stamp-size-val">80px</span>
          </div>
        </div>
        <div id="stamp-preview-wrap">
          <canvas id="stamp-canvas-preview" width="80" height="80"></canvas>
        </div>
        <div id="stamp-hint">
          1ページ目をクリックして押印位置を指定してください。<br>ドラッグで移動できます。
        </div>
        <button id="stamp-apply-btn" disabled>この位置で押印してダウンロード</button>
      </div>
      <div id="stamp-canvas-area">
        <div id="stamp-page-wrap">
          <canvas id="stamp-page-canvas"></canvas>
          <canvas id="stamp-overlay"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="app">
  <h1>📄 PDF Merger</h1>
  <div id="drop-zone">
    <div class="icon">＋</div>
    <strong style="font-size:15px;">PDFファイルを追加</strong>
    <p>ここにドラッグ&ドロップ、またはクリックして選択（複数可）</p>
    <input type="file" id="file-input" accept=".pdf" multiple>
  </div>
  <div id="page-grid"></div>
  <div id="empty-state">PDFファイルを追加するとページが表示されます</div>
  <div id="bottom-bar">
    <div id="prefix-row">
      <span id="prefix-label">区分</span>
      <label class="prefix-opt"><input type="radio" name="category" value="設備"> 設備</label>
      <label class="prefix-opt"><input type="radio" name="category" value="請求書"> 請求書</label>
      <label class="prefix-opt"><input type="radio" name="category" value="修繕"> 修繕</label>
      <label class="prefix-opt"><input type="radio" name="category" value="" checked> なし</label>
      <span id="prefix-bracket-wrap">【<input type="text" id="bracket-input" placeholder="手動入力" maxlength="20">】</span>
      <span id="prefix-preview"></span>
    </div>
    <div id="filename-row">
      <label for="filename">ファイル名</label>
      <input type="text" id="filename" value="merged.pdf" placeholder="merged.pdf">
      <button class="btn btn-scan" id="scan-btn" disabled>🔍 見積名称を読み取る</button>
      <span id="scan-hint"></span>
    </div>
    <div id="action-row">
      <span id="status"></span>
      <button class="btn" id="clear-btn" style="display:none">クリア</button>
      <button class="btn" id="stamp-btn" disabled>🔴 押印</button>
      <button class="btn btn-primary" id="download-btn" disabled>ダウンロード</button>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// fileId → File オブジェクトのキャッシュ（ArrayBufferは使い捨て、Fileは何度でも読める）
const fileCache = {};

const state = { pages: [], dragSrc: null, firstFileId: null };

const grid = document.getElementById('page-grid');
const emptyState = document.getElementById('empty-state');
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const downloadBtn = document.getElementById('download-btn');
const clearBtn = document.getElementById('clear-btn');
const statusEl = document.getElementById('status');
const filenameInput = document.getElementById('filename');
const scanBtn = document.getElementById('scan-btn');
const scanHint = document.getElementById('scan-hint');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value = ''; });

let suppressInputEvent = false;
filenameInput.addEventListener('input', () => {
  if (suppressInputEvent) return;
  filenameInput.classList.remove('auto-filled');
  scanHint.textContent = '';
});

// ===== プレフィックス（区分・括弧）制御 =====
const bracketInput = document.getElementById('bracket-input');
const prefixPreview = document.getElementById('prefix-preview');

function buildPrefix() {
  const cat = document.querySelector('input[name="category"]:checked')?.value || '';
  const bracket = bracketInput.value.trim();
  let prefix = '';
  if (cat) prefix += `(${cat})`;
  if (bracket) prefix += `【${bracket}】`;
  return prefix;
}

function updatePrefixPreview() {
  const p = buildPrefix();
  prefixPreview.textContent = p ? `→ ${p}ファイル名` : '';
}

document.querySelectorAll('input[name="category"]').forEach(r => {
  r.addEventListener('change', updatePrefixPreview);
});
bracketInput.addEventListener('input', updatePrefixPreview);
updatePrefixPreview();

clearBtn.addEventListener('click', () => {
  state.pages = [];
  state.firstFileId = null;
  Object.keys(fileCache).forEach(k => delete fileCache[k]);
  filenameInput.value = 'merged.pdf';
  filenameInput.classList.remove('auto-filled');
  scanHint.textContent = '';
  renderGrid();
  updateUI();
});

// ===== 工事名抽出ボタン =====
scanBtn.addEventListener('click', async () => {
  if (!state.pages.length) return;
  scanBtn.disabled = true;
  scanBtn.textContent = '読み取り中...';
  scanHint.textContent = '';
  filenameInput.classList.remove('auto-filled');

  try {
    // グリッド上2番目（統合後の2ページ目）を基準、なければ1番目
    const targetPage = state.pages[1] ?? state.pages[0];
    delete pdfDocCache[targetPage.fileId];
    const file = fileCache[targetPage.fileId];
    const freshAb = await file.arrayBuffer();
    const name = await extractProjectName(freshAb, targetPage.pageNum);

    if (name) {
      suppressInputEvent = true;
      filenameInput.value = buildPrefix() + name + '.pdf';
      suppressInputEvent = false;
      filenameInput.classList.add('auto-filled');
      scanHint.style.color = '#3a9d5a';
      scanHint.textContent = '✓ 取得成功';
    } else {
      scanHint.style.color = '#c0392b';
      scanHint.textContent = '取得できませんでした。手動で入力してください。';
    }
  } catch(e) {
    console.error(e);
    scanHint.style.color = '#c0392b';
    scanHint.textContent = 'エラーが発生しました。';
  }

  scanBtn.disabled = false;
  scanBtn.textContent = '🔍 見積名称を読み取る';
});

// ===== 工事名抽出ロジック =====
const HEADER_WORDS = ['御社工事番号', '工事名称', '機器費', '材料費', '品目名称', '外注計', '材料外注計', '工数', '管理費', '小計', '経費', '労災費', '税前計', '値引', '改め計', '工数単価', '経費係数'];

function looksLikeProjectName(str) {
  if (!str || str.length < 4) return false;
  if (/^[\d\s,\.\-\/０-９]+$/.test(str)) return false;
  if (HEADER_WORDS.some(w => str.includes(w))) return false;
  return /[\u30A0-\u30FF\u4E00-\u9FFF\u3040-\u309F]/.test(str);
}

async function extractProjectName(ab, targetPageNum) {
  const pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
  if (!targetPageNum || targetPageNum > pdfDoc.numPages) targetPageNum = pdfDoc.numPages;
  const page = await pdfDoc.getPage(targetPageNum);
  const content = await page.getTextContent();

  // Y座標でテキストを行にグループ化
  const rows = {};
  for (const item of content.items) {
    const text = item.str.trim();
    if (!text) continue;
    const y = Math.round(item.transform[5]);
    if (!rows[y]) rows[y] = [];
    rows[y].push({ text, x: item.transform[4] });
  }

  // Y降順（ページ上→下）で行リスト化
  const lines = Object.keys(rows)
    .map(Number)
    .sort((a, b) => b - a)
    .map(y => rows[y].sort((a, b) => a.x - b.x).map(i => i.text).join(''));

  // ヘッダ行の位置を探す
  const headerIdx = lines.findIndex(l => HEADER_WORDS.some(w => l.includes(w)));

  // ヘッダより上を優先して探す
  const candidates = headerIdx > 0 ? lines.slice(0, headerIdx) : lines;
  for (const line of candidates) {
    if (looksLikeProjectName(line)) return line;
  }

  // なければヘッダ以降も探す
  if (headerIdx >= 0) {
    for (let i = headerIdx + 1; i < lines.length; i++) {
      if (looksLikeProjectName(lines[i])) return lines[i];
    }
  }

  return null;
}

// ===== ファイル読み込み =====
async function handleFiles(files) {
  const pdfs = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (!pdfs.length) return;
  setStatus('読み込み中...');

  for (let fi = 0; fi < pdfs.length; fi++) {
    const file = pdfs[fi];
    const fileId = `file_${Date.now()}_${fi}`;
    fileCache[fileId] = file; // Fileオブジェクトを保存

    if (fi === 0 && !state.firstFileId) state.firstFileId = fileId;

    const ab = await file.arrayBuffer(); // サムネイル用に一度だけ読む
    const pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;

    for (let i = 1; i <= pdfDoc.numPages; i++) {
      state.pages.push({
        fileId,        // File参照キー
        pageNum: i,
        rotation: 0,
        label: file.name,
        id: Math.random().toString(36).slice(2)
      });
    }
  }

  renderGrid();
  updateUI();
  setStatus('');
}

// ===== サムネイル =====
// fileId→PDFDocumentのキャッシュ（PDF.jsのdoc）
const pdfDocCache = {};

async function getPdfDoc(fileId) {
  if (pdfDocCache[fileId]) return pdfDocCache[fileId];
  const file = fileCache[fileId];
  const ab = await file.arrayBuffer();
  const doc = await pdfjsLib.getDocument({ data: ab }).promise;
  pdfDocCache[fileId] = doc;
  return doc;
}

async function renderThumb(page, card) {
  const existing = card.querySelector('canvas');
  if (existing) existing.remove();
  const loader = document.createElement('div');
  loader.className = 'loading-overlay';
  loader.textContent = '...';
  card.insertBefore(loader, card.firstChild);
  try {
    const pdfDoc = await getPdfDoc(page.fileId);
    const pdfPage = await pdfDoc.getPage(page.pageNum);
    const rot = ((page.rotation % 360) + 360) % 360;
    const viewport = pdfPage.getViewport({ scale: 0.45, rotation: rot });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await pdfPage.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    loader.remove();
    card.insertBefore(canvas, card.querySelector('.page-card-footer'));
  } catch(e) {
    loader.textContent = 'エラー';
    console.error(e);
  }
}

// ===== グリッド =====
function renderGrid() {
  grid.innerHTML = '';
  if (!state.pages.length) { emptyState.style.display = 'block'; return; }
  emptyState.style.display = 'none';

  state.pages.forEach((page, idx) => {
    const card = document.createElement('div');
    card.className = 'page-card';
    card.dataset.idx = idx;
    card.draggable = true;

    const numBadge = document.createElement('div');
    numBadge.className = 'page-number';
    numBadge.textContent = idx + 1;

    const footer = document.createElement('div');
    footer.className = 'page-card-footer';

    const label = document.createElement('div');
    label.className = 'page-label';
    label.title = `${page.label} p.${page.pageNum}`;
    label.textContent = `${page.label.replace(/\.pdf$/i, '')} p${page.pageNum}`;

    const actions = document.createElement('div');
    actions.className = 'page-actions';

    const rotBtn = document.createElement('button');
    rotBtn.className = 'icon-btn'; rotBtn.title = '回転'; rotBtn.textContent = '↻';
    rotBtn.addEventListener('click', e => {
      e.stopPropagation();
      page.rotation = (page.rotation + 90) % 360;
      renderThumb(page, card);
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'icon-btn del'; delBtn.title = '削除'; delBtn.textContent = '×';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      state.pages.splice(idx, 1);
      renderGrid();
      updateUI();
    });

    actions.append(rotBtn, delBtn);
    footer.append(label, actions);
    card.append(numBadge, footer);

    card.addEventListener('click', () => openPreview(idx));
    card.addEventListener('dragstart', () => {
      state.dragSrc = idx;
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.drag-over-card').forEach(c => c.classList.remove('drag-over-card'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      card.classList.add('drag-over-card');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over-card'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over-card');
      if (state.dragSrc === null || state.dragSrc === idx) return;
      const moved = state.pages.splice(state.dragSrc, 1)[0];
      state.pages.splice(idx, 0, moved);
      renderGrid();
      updateUI();
    });

    grid.appendChild(card);
    renderThumb(page, card);
  });
}

function updateUI() {
  const has = state.pages.length > 0;
  downloadBtn.disabled = !has;
  clearBtn.style.display = has ? '' : 'none';
  scanBtn.disabled = !state.pages.length;
  if (typeof stampBtn !== 'undefined') stampBtn.disabled = !has;
  statusEl.textContent = has ? `${state.pages.length} ページ` : '';
}

function setStatus(msg) { statusEl.textContent = msg; }

// ===== ダウンロード =====
downloadBtn.addEventListener('click', async () => {
  downloadBtn.disabled = true;
  setStatus('生成中...');
  try {
    const { PDFDocument, degrees } = PDFLib;
    const merged = await PDFDocument.create();
    // fileIdごとにPDFDocumentを一度だけロード
    const pdfLibCache = {};
    for (const page of state.pages) {
      if (!pdfLibCache[page.fileId]) {
        const file = fileCache[page.fileId];
        const ab = await file.arrayBuffer();
        pdfLibCache[page.fileId] = await PDFDocument.load(ab);
      }
      const src = pdfLibCache[page.fileId];
      const [copied] = await merged.copyPages(src, [page.pageNum - 1]);
      if (page.rotation) {
        copied.setRotation(degrees(((page.rotation % 360) + 360) % 360));
      }
      merged.addPage(copied);
    }
    const bytes = await merged.save();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    let name = filenameInput.value.trim() || 'merged';
    if (!name.endsWith('.pdf')) name += '.pdf';
    a.download = name;
    a.click();
    URL.revokeObjectURL(url);
    setStatus('完了！');
    setTimeout(() => setStatus(`${state.pages.length} ページ`), 2500);
  } catch(e) {
    setStatus('エラーが発生しました');
    console.error(e);
  }
  downloadBtn.disabled = false;
});

// ===== ページプレビュー =====
const previewModal = document.getElementById('preview-modal');
const previewTitle = document.getElementById('preview-title');
const previewPageInfo = document.getElementById('preview-page-info');
const previewCanvas = document.getElementById('preview-canvas');
const previewClose = document.getElementById('preview-close');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

let previewIdx = null;

async function openPreview(idx) {
  previewIdx = idx;
  previewModal.classList.add('open');
  await renderPreview();
}

function closePreview() {
  previewModal.classList.remove('open');
  previewIdx = null;
}

async function renderPreview() {
  if (previewIdx === null) return;
  const page = state.pages[previewIdx];
  previewTitle.textContent = page.label.replace(/\.pdf$/i, '') + ' p' + page.pageNum;
  previewPageInfo.textContent = (previewIdx + 1) + ' / ' + state.pages.length;
  prevBtn.disabled = previewIdx <= 0;
  nextBtn.disabled = previewIdx >= state.pages.length - 1;

  const ctx = previewCanvas.getContext('2d');
  ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
  previewCanvas.width = 100; previewCanvas.height = 100;

  try {
    const pdfDoc = await getPdfDoc(page.fileId);
    const pdfPage = await pdfDoc.getPage(page.pageNum);
    const rot = ((page.rotation % 360) + 360) % 360;
    const baseVp = pdfPage.getViewport({ scale: 1, rotation: rot });
    const maxW = window.innerWidth * 0.84;
    const maxH = window.innerHeight * 0.78;
    const scale = Math.min(maxW / baseVp.width, maxH / baseVp.height, 2.5);
    const viewport = pdfPage.getViewport({ scale, rotation: rot });
    previewCanvas.width = viewport.width;
    previewCanvas.height = viewport.height;
    await pdfPage.render({ canvasContext: ctx, viewport }).promise;
  } catch(e) { console.error(e); }
}

previewClose.addEventListener('click', closePreview);
previewModal.addEventListener('click', e => { if (e.target === previewModal) closePreview(); });
prevBtn.addEventListener('click', () => { if (previewIdx > 0) { previewIdx--; renderPreview(); } });
nextBtn.addEventListener('click', () => { if (previewIdx < state.pages.length - 1) { previewIdx++; renderPreview(); } });
document.addEventListener('keydown', e => {
  if (!previewModal.classList.contains('open')) return;
  if (e.key === 'Escape') closePreview();
  if (e.key === 'ArrowLeft' && previewIdx > 0) { previewIdx--; renderPreview(); }
  if (e.key === 'ArrowRight' && previewIdx < state.pages.length - 1) { previewIdx++; renderPreview(); }
});


// ===== 押印機能 =====
const stampModal   = document.getElementById('stamp-modal');
const stampClose   = document.getElementById('stamp-close');
const stampBtn     = document.getElementById('stamp-btn');
const stampNameInp = document.getElementById('stamp-name');
const stampSizeInp = document.getElementById('stamp-size');
const stampSizeVal = document.getElementById('stamp-size-val');
const stampPreviewCanvas = document.getElementById('stamp-canvas-preview');
const stampPageCanvas    = document.getElementById('stamp-page-canvas');
const stampOverlayCanvas = document.getElementById('stamp-overlay');
const stampApplyBtn      = document.getElementById('stamp-apply-btn');
const stampPageWrap      = document.getElementById('stamp-page-wrap');

let stampPos = null;      // {x, y} キャンバス座標（中心）
let stampSize = 29;
let stampScale = 1;       // pdfページ→canvas倍率
let stampDragging = false;
let stampDragOff = {x:0, y:0};

// stampBtnの状態はopenStampModal内で制御（updateUIのオーバーライドは行わない）

function drawStampShape(ctx, name, size, alpha) {
  const cx = size / 2, cy = size / 2, r = size / 2 - 2;
  ctx.clearRect(0, 0, size, size);
  ctx.globalAlpha = alpha ?? 1;
  ctx.strokeStyle = '#c0392b';
  ctx.fillStyle   = '#c0392b';
  ctx.lineWidth   = Math.max(2, size * 0.04);

  // 外円
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();

  if (!name) { ctx.globalAlpha = 1; return; }

  const chars = [...name];
  const n = chars.length;

  if (n <= 3) {
    // 縦並び中央
    const fsize = Math.floor(r * (n === 1 ? 1.1 : n === 2 ? 0.72 : 0.52));
    ctx.font = `bold ${fsize}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const lineH = fsize * 1.15;
    const totalH = lineH * n;
    chars.forEach((ch, i) => {
      ctx.fillText(ch, cx, cy - totalH/2 + lineH * i + lineH/2);
    });
  } else {
    // 円周配置
    const fsize = Math.floor(r * 0.42);
    ctx.font = `bold ${fsize}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const textR = r * 0.68;
    const angleStep = (Math.PI * 2) / n;
    const startAngle = -Math.PI / 2;
    chars.forEach((ch, i) => {
      const angle = startAngle + angleStep * i;
      const tx = cx + textR * Math.cos(angle);
      const ty = cy + textR * Math.sin(angle);
      ctx.save();
      ctx.translate(tx, ty);
      ctx.rotate(angle + Math.PI / 2);
      ctx.fillText(ch, 0, 0);
      ctx.restore();
    });
  }
  ctx.globalAlpha = 1;
}

function updateStampPreview() {
  stampSize = parseInt(stampSizeInp.value);
  stampSizeVal.textContent = stampSize + 'px';
  stampPreviewCanvas.width  = stampSize;
  stampPreviewCanvas.height = stampSize;
  stampPreviewCanvas.style.width  = stampSize + 'px';
  stampPreviewCanvas.style.height = stampSize + 'px';
  const ctx = stampPreviewCanvas.getContext('2d');
  drawStampShape(ctx, stampNameInp.value.trim(), stampSize, 1);
  if (stampPos) drawOverlay();
}

function drawOverlay() {
  const oc = stampOverlayCanvas;
  const ctx = oc.getContext('2d');
  ctx.clearRect(0, 0, oc.width, oc.height);
  if (!stampPos) return;
  const s = stampSize;
  ctx.save();
  ctx.translate(stampPos.x - s/2, stampPos.y - s/2);
  drawStampShape(ctx, stampNameInp.value.trim(), s, 0.82);
  ctx.restore();
}

async function openStampModal() {
  if (!state.pages.length) return;
  stampModal.classList.add('open');
  stampPos = null;
  stampApplyBtn.disabled = true;

  // 1ページ目を描画
  const page = state.pages[0];
  const pdfDoc = await getPdfDoc(page.fileId);
  const pdfPage = await pdfDoc.getPage(page.pageNum);
  const rot = ((page.rotation % 360) + 360) % 360;
  const maxW = Math.min(window.innerWidth * 0.65, 700);
  const maxH = window.innerHeight * 0.78;
  const baseVp = pdfPage.getViewport({ scale: 1, rotation: rot });
  const scale = Math.min(maxW / baseVp.width, maxH / baseVp.height);
  stampScale = scale;
  const vp = pdfPage.getViewport({ scale, rotation: rot });

  stampPageCanvas.width  = vp.width;
  stampPageCanvas.height = vp.height;
  stampOverlayCanvas.width  = vp.width;
  stampOverlayCanvas.height = vp.height;
  stampOverlayCanvas.style.position = 'absolute';
  stampOverlayCanvas.style.left = '0'; stampOverlayCanvas.style.top = '0';

  const ctx = stampPageCanvas.getContext('2d');
  await pdfPage.render({ canvasContext: ctx, viewport: vp }).promise;
  updateStampPreview();
}

function getCanvasPos(e) {
  const rect = stampOverlayCanvas.getBoundingClientRect();
  const scaleX = stampOverlayCanvas.width  / rect.width;
  const scaleY = stampOverlayCanvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY
  };
}

stampOverlayCanvas.addEventListener('mousedown', e => {
  const pos = getCanvasPos(e);
  if (stampPos) {
    const dx = pos.x - stampPos.x, dy = pos.y - stampPos.y;
    if (Math.hypot(dx, dy) < stampSize / 2 + 10) {
      stampDragging = true;
      stampDragOff = { x: dx, y: dy };
      return;
    }
  }
  stampPos = pos;
  stampApplyBtn.disabled = false;
  drawOverlay();
});
stampOverlayCanvas.addEventListener('mousemove', e => {
  if (!stampDragging) return;
  const pos = getCanvasPos(e);
  stampPos = { x: pos.x - stampDragOff.x, y: pos.y - stampDragOff.y };
  drawOverlay();
});
window.addEventListener('mouseup', () => { stampDragging = false; });

// 印鑑名をlocalStorageから復元
const _savedStampName = localStorage.getItem('stampName');
if (_savedStampName) stampNameInp.value = _savedStampName;

stampNameInp.addEventListener('input', () => {
  localStorage.setItem('stampName', stampNameInp.value);
  updateStampPreview();
});
stampSizeInp.addEventListener('input', updateStampPreview);

stampBtn.addEventListener('click', openStampModal);
stampClose.addEventListener('click', () => stampModal.classList.remove('open'));
stampModal.addEventListener('click', e => { if (e.target === stampModal) stampModal.classList.remove('open'); });

stampApplyBtn.addEventListener('click', async () => {
  if (!stampPos) return;
  stampApplyBtn.disabled = true;
  stampApplyBtn.textContent = '処理中...';
  try {
    const { PDFDocument, degrees } = PDFLib;
    // マージ処理
    const merged = await PDFDocument.create();
    const pdfLibCache = {};
    for (const page of state.pages) {
      if (!pdfLibCache[page.fileId]) {
        const file = fileCache[page.fileId];
        const ab = await file.arrayBuffer();
        pdfLibCache[page.fileId] = await PDFDocument.load(ab);
      }
      const src = pdfLibCache[page.fileId];
      const [copied] = await merged.copyPages(src, [page.pageNum - 1]);
      if (page.rotation) copied.setRotation(degrees(((page.rotation % 360) + 360) % 360));
      merged.addPage(copied);
    }

    // 印鑑をCanvasでPNG画像として生成（日本語対応）
    const dpr = 3; // 高解像度
    const stampPx = stampSize * dpr;
    const offscreen = document.createElement('canvas');
    offscreen.width = stampPx;
    offscreen.height = stampPx;
    const octx = offscreen.getContext('2d');
    drawStampShape(octx, stampNameInp.value.trim(), stampPx, 0.85);

    // PNG → ArrayBuffer
    const pngDataUrl = offscreen.toDataURL('image/png');
    const base64 = pngDataUrl.split(',')[1];
    const binary = atob(base64);
    const pngBytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) pngBytes[i] = binary.charCodeAt(i);

    // PDF-libに画像埋め込み
    const pngImage = await merged.embedPng(pngBytes);

    // 1ページ目に配置
    const firstPage = merged.getPage(0);
    const { width: pw, height: ph } = firstPage.getSize();
    const canvasW = stampPageCanvas.width;
    const canvasH = stampPageCanvas.height;

    // PDF単位でのサイズ（stampSizeはcanvasピクセル → stampScale でPDFポイントに変換）
    const pdfStampSize = stampSize / stampScale;
    const pdfX = (stampPos.x / canvasW) * pw - pdfStampSize / 2;
    const pdfY = ph - (stampPos.y / canvasH) * ph - pdfStampSize / 2;

    firstPage.drawImage(pngImage, {
      x: pdfX, y: pdfY,
      width: pdfStampSize, height: pdfStampSize,
    });

    const bytes = await merged.save();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    let fname = filenameInput.value.trim() || 'merged';
    if (!fname.endsWith('.pdf')) fname += '.pdf';
    a.download = fname;
    a.click();
    URL.revokeObjectURL(url);
    stampModal.classList.remove('open');
  } catch(e) {
    console.error(e);
    alert('押印処理中にエラーが発生しました: ' + e.message);
  }
  stampApplyBtn.disabled = false;
  stampApplyBtn.textContent = 'この位置で押印してダウンロード';
});

</script>
